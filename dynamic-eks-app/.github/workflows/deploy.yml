name: Deploy to EKS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPO: dynamic-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 🔥 FIX 1: Install kubectl (MANDATORY)
    - name: Install kubectl
      run: |
        curl -o kubectl https://s3.us-west-2.amazonaws.com/amazon-eks/1.29.0/2024-01-04/bin/linux/amd64/kubectl
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION \
        | docker login --username AWS --password-stdin ${{ secrets.ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

    - name: Build and Push Docker Image
      run: |
        IMAGE=${{ secrets.ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest
        docker build -t $IMAGE .
        docker push $IMAGE
        echo "IMAGE=$IMAGE" >> $GITHUB_ENV

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ secrets.CLUSTER_NAME }} --region $AWS_REGION

    # 🔥 FIX 2: Add debug + proper deploy loop
    - name: Deploy Multiple Services
      run: |
        echo "Reading config file..."
        cat config.conf

        while IFS='|' read -r SERVICE ENV CUSTOM; do

          echo "Deploying: $SERVICE $ENV $CUSTOM"

          NAME=$(echo "$SERVICE-$ENV" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')

          sed -e "s/{{NAME}}/$NAME/g" \
              -e "s/{{IMAGE}}/$IMAGE/g" \
              -e "s/{{SERVICE_NAME}}/$SERVICE/g" \
              -e "s/{{ENV}}/$ENV/g" \
              -e "s/{{CUSTOM_VALUE}}/$CUSTOM/g" \
              deployment-template.yml > deploy-$NAME.yml

          echo "Generated manifest:"
          cat deploy-$NAME.yml

          kubectl apply -f deploy-$NAME.yml

        done < config.conf
